<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Cards Example</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      padding: 20px;
    }
    .card {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 15px;
      width: 250px;
      box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
    }
    .card h3 {
      margin: 0 0 10px;
      font-size: 18px;
    }
    .card p {
      color: #555;
    }
  </style>
</head>
<body>
  
  <script>
    // API endpoint (you can use any API)
    const apiUrl = "https://jsonplaceholder.typicode.com/users";

    // Fetch data from API
    fetch(apiUrl)
      .then(response => response.json())
      .then(data => {
        data.forEach(user => {
          // Create card div
          const card = document.createElement("div");
          card.className = "card";

          // Add content
          card.innerHTML = `
            <h3>${user.name}</h3>
            <p><b>Email:</b> ${user.email}</p>
            <p><b>City:</b> ${user.address.city}</p>
          `;

          // Append to body
          document.body.appendChild(card);
        });
      })
      .catch(error => console.error("Error fetching data:", error));
  </script>
</body>
</html>
