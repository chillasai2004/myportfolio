<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Food Receiver Form</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: url('https://images.unsplash.com/photo-1617196038439-2e8e3e3b23a1') no-repeat center center/cover;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .receiver-form {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 30px;
      max-width: 480px;
      width: 100%;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
      animation: fadeIn 1s ease-in-out;
      transition: transform 0.3s ease;
    }

    .receiver-form:hover {
      transform: scale(1.02);
    }

    .receiver-form h2 {
      text-align: center;
      color: white;
      margin-bottom: 25px;
      text-shadow: 1px 1px 3px #000;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      color: white;
      font-weight: 600;
      display: block;
      margin-bottom: 6px;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.9);
      font-size: 15px;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      box-shadow: 0 0 8px rgba(0,0,0,0.2);
    }

    .btn-group {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .btn-group button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background-color: #28a745;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .btn-group button:hover {
      background-color: #218838;
    }

    .btn-group button.reset {
      background-color: #dc3545;
    }

    .btn-group button.reset:hover {
      background-color: #c82333;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 600px) {
      .receiver-form {
        padding: 25px 20px;
      }

      .btn-group {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="receiver-form">
    <h2>Receive Food Form</h2>
    <form>
      <div class="form-group">
        <label for="receiverName">Your Name</label>
        <input type="text" id="receiverName" placeholder="Enter your name" required />
      </div>

      <div class="form-group">
        <label for="foodType">Food Type</label>
        <select id="foodType" required>
          <option value="">Select</option>
          <option value="Vegetarian">Vegetarian</option>
          <option value="Non-Vegetarian">Non-Vegetarian</option>
          <option value="Any">Any</option>
        </select>
      </div>

      <div class="form-group">
        <label for="quantity">Required Quantity</label>
        <input type="number" id="quantity" placeholder="e.g. 5 plates" required />
      </div>

      <div class="form-group">
        <label for="address">Delivery Address</label>
        <textarea id="address" rows="3" placeholder="Enter full address" required></textarea>
      </div>

      <div class="btn-group">
        <button type="submit">Submit</button>
        <button type="reset" class="reset">Cancel</button>
      </div>
    </form>
  </div>
</body>
</html>
